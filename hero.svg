<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-label="David Rose — AI Systems Engineer">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .frame { stroke: #30363d; fill: none; }
      .name { font: 700 34px 'Segoe UI', -apple-system, system-ui, sans-serif; fill: #e6edf3; }
      .role { font: 600 17px 'Segoe UI', -apple-system, system-ui, sans-serif; fill: #58a6ff; letter-spacing: 0.3px; }
      .tagline { font: 400 15px 'Segoe UI', -apple-system, system-ui, sans-serif; fill: #8b949e; }
      .handle { font: 500 13px 'SF Mono', ui-monospace, 'Consolas', monospace; fill: #6e7681; }
      .chip-bg { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .chip-dot { fill: #58a6ff; }
      .chip-text { font: 500 13px 'Segoe UI', -apple-system, system-ui, sans-serif; fill: #c9d1d9; }
      .stat-num { font: 700 22px 'SF Mono', ui-monospace, 'Consolas', monospace; fill: #e6edf3; }
      .stat-label { font: 400 12px 'Segoe UI', -apple-system, system-ui, sans-serif; fill: #8b949e; }
      .cell { fill: #58a6ff; }
      .divider { stroke: #21262d; stroke-width: 1; }

      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .frame { stroke: #d0d7de; }
        .name { fill: #1f2328; }
        .role { fill: #0969da; }
        .tagline { fill: #636c76; }
        .handle { fill: #818b98; }
        .chip-bg { fill: #f6f8fa; stroke: #d0d7de; }
        .chip-dot { fill: #0969da; }
        .chip-text { fill: #1f2328; }
        .stat-num { fill: #1f2328; }
        .stat-label { fill: #636c76; }
        .cell { fill: #0969da; }
        .divider { stroke: #eaeef2; }
      }

      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .grid { animation: fade-in 1.2s ease-out forwards; }
    </style>
  </defs>

  <rect width="900" height="300" class="bg" rx="12"/>
  <rect x="1" y="1" width="898" height="298" class="frame" stroke-width="1" rx="12"/>

  <!-- Identity -->
  <text x="36" y="62" class="name">David Rose</text>
  <text x="864" y="40" class="handle" text-anchor="end">@cipher982</text>
  <text x="36" y="90" class="role">AI Systems Engineer</text>
  <text x="36" y="120" class="tagline">I build autonomous agents, LLM tooling, and ship real products.</text>

  <!-- Flagship chips -->
  
    <g transform="translate(36, 150)">
      <rect width="96" height="30" rx="15" class="chip-bg"/>
      <circle cx="16" cy="15" r="3" class="chip-dot"/>
      <text x="28" y="20" class="chip-text">Longhouse</text>
    </g>
    <g transform="translate(144, 150)">
      <rect width="145" height="30" rx="15" class="chip-bg"/>
      <circle cx="16" cy="15" r="3" class="chip-dot"/>
      <text x="28" y="20" class="chip-text">Stop Sign Nanny</text>
    </g>
    <g transform="translate(301, 150)">
      <rect width="137" height="30" rx="15" class="chip-bg"/>
      <circle cx="16" cy="15" r="3" class="chip-dot"/>
      <text x="28" y="20" class="chip-text">LLM Benchmarks</text>
    </g>

  <line x1="36" y1="198" x2="864" y2="198" class="divider"/>

  <!-- Shipping metrics -->
  <g transform="translate(36, 224)">
    <text x="0" y="0" class="stat-num">595</text>
    <text x="0" y="18" class="stat-label">commits · 30d</text>

    <text x="150" y="0" class="stat-num">18</text>
    <text x="150" y="18" class="stat-label">active repos</text>
  </g>

  <!-- Contribution grid (last 30 days, right-aligned) -->
  <text x="864" y="210" class="stat-label" text-anchor="end">commit activity · 30d</text>
  <g class="grid">
  <rect x="783" y="218" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="783" y="232" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="783" y="246" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="783" y="260" width="11" height="11" rx="3" class="cell" fill-opacity="0.40"/>
  <rect x="783" y="274" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="797" y="218" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="797" y="232" width="11" height="11" rx="3" class="cell" fill-opacity="0.40"/>
  <rect x="797" y="246" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="797" y="260" width="11" height="11" rx="3" class="cell" fill-opacity="0.40"/>
  <rect x="797" y="274" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="811" y="218" width="11" height="11" rx="3" class="cell" fill-opacity="0.82"/>
  <rect x="811" y="232" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="811" y="246" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="811" y="260" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="811" y="274" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="825" y="218" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="825" y="232" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="825" y="246" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="825" y="260" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="825" y="274" width="11" height="11" rx="3" class="cell" fill-opacity="0.62"/>
  <rect x="839" y="218" width="11" height="11" rx="3" class="cell" fill-opacity="0.82"/>
  <rect x="839" y="232" width="11" height="11" rx="3" class="cell" fill-opacity="0.40"/>
  <rect x="839" y="246" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="839" y="260" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="839" y="274" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="853" y="218" width="11" height="11" rx="3" class="cell" fill-opacity="0.82"/>
  <rect x="853" y="232" width="11" height="11" rx="3" class="cell" fill-opacity="0.40"/>
  <rect x="853" y="246" width="11" height="11" rx="3" class="cell" fill-opacity="0.82"/>
  <rect x="853" y="260" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  <rect x="853" y="274" width="11" height="11" rx="3" class="cell" fill-opacity="1.00"/>
  </g>
</svg>