name: Link Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate links
        run: python3 scripts/check_links.py README.md TEMPLATE.md
